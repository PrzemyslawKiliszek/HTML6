<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrГёnsted-SГ¤ure-Base-Reaktionen</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }
        .game-container {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-top: 0;
            font-size: 24px;
        }
        .reaction-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .reaction-btn {
            padding: 10px 15px;
            border: none;
            border-radius: 25px;
            background-color: #f0f0f0;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .reaction-btn:hover {
            background-color: #e0e0e0;
        }
        .reaction-btn.active {
            background-color: #667eea;
            color: white;
        }
        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        .molecules {
            display: flex;
            justify-content: space-around;
            width: 100%;
            gap: 20px;
        }
        .molecule {
            flex: 1;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .molecule.dragging {
            opacity: 0.5;
        }
        .molecule.can-donate {
            animation: pulse 1.5s infinite;
        }
        .bubble {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            box-shadow: 20px 20px 60px #bebebe, -20px -20px 60px #ffffff;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            position: relative;
            transition: all 0.3s;
        }
        .bubble.small {
            width: 80px;
            height: 80px;
            font-size: 16px;
        }
        .h-plus {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(145deg, #ff6b6b, #ff3838);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            cursor: grab;
            box-shadow: 0 5px 15px rgba(255,56,56,0.4);
            transition: all 0.3s;
            z-index: 100;
        }
        .h-plus.dragging {
            opacity: 0.7;
            transform: scale(0.9);
            cursor: grabbing;
        }
        .message {
            text-align: center;
            font-size: 18px;
            color: #333;
            min-height: 60px;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 10px;
            width: 100%;
        }
        .reset-btn {
            padding: 10px 30px;
            border: none;
            border-radius: 25px;
            background-color: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .reset-btn:hover {
            background-color: #5a67d8;
        }
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(102, 126, 234, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(102, 126, 234, 0);
            }
        }
        .arrow {
            font-size: 30px;
            color: #666;
        }
        .reaction-equation {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            padding: 10px;
            background-color: #e3f2fd;
            border-radius: 10px;
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>рџ§Є BrГёnsted-SГ¤ure-Base-Reaktionen рџ§Є</h1>
        
        <div class="reaction-selector">
            <button class="reaction-btn active" data-reaction="hcl-h2o">HCl + Hв‚‚O</button>
            <button class="reaction-btn" data-reaction="nh3-h2o">NHв‚ѓ + Hв‚‚O</button>
            <button class="reaction-btn" data-reaction="hcl-oh">HCl + OHвЃ»</button>
            <button class="reaction-btn" data-reaction="hco3-h3o">HCOв‚ѓвЃ» + Hв‚ѓOвЃє</button>
            <button class="reaction-btn" data-reaction="hno3-h2o">HNOв‚ѓ + Hв‚‚O</button>
            <button class="reaction-btn" data-reaction="ch3cooh-h2o">CHв‚ѓCOOH + Hв‚‚O</button>
            <button class="reaction-btn" data-reaction="ch3coo-h3o">CHв‚ѓCOOвЃ» + Hв‚ѓOвЃє</button>
            <button class="reaction-btn" data-reaction="h2so4-h2o">Hв‚‚SOв‚„ + Hв‚‚O</button>
        </div>

        <div class="game-area">
            <div class="molecules">
                <div class="molecule" id="molecule1"></div>
                <div class="arrow">вћ•</div>
                <div class="molecule" id="molecule2"></div>
            </div>

            <div class="message" id="message">
                Tippe auf die SГ¤ure (HвЃє-Donator), um das Proton zu greifen!
            </div>

            <div class="reaction-equation" id="equation"></div>

            <button class="reset-btn" onclick="resetGame()">Neustart</button>
        </div>
    </div>

    <script>
        const reactions = {
            'hcl-h2o': {
                acid: { formula: 'HCl', conjugate: 'ClвЃ»', donates: true },
                base: { formula: 'Hв‚‚O', conjugate: 'Hв‚ѓOвЃє', donates: false },
                equation: 'HCl + Hв‚‚O в†’ ClвЃ» + Hв‚ѓOвЃє'
            },
            'nh3-h2o': {
                acid: { formula: 'Hв‚‚O', conjugate: 'OHвЃ»', donates: true },
                base: { formula: 'NHв‚ѓ', conjugate: 'NHв‚„вЃє', donates: false },
                equation: 'NHв‚ѓ + Hв‚‚O в†’ NHв‚„вЃє + OHвЃ»'
            },
            'hcl-oh': {
                acid: { formula: 'HCl', conjugate: 'ClвЃ»', donates: true },
                base: { formula: 'OHвЃ»', conjugate: 'Hв‚‚O', donates: false },
                equation: 'HCl + OHвЃ» в†’ ClвЃ» + Hв‚‚O'
            },
            'hco3-h3o': {
                acid: { formula: 'Hв‚ѓOвЃє', conjugate: 'Hв‚‚O', donates: true },
                base: { formula: 'HCOв‚ѓвЃ»', conjugate: 'Hв‚‚COв‚ѓ', donates: false },
                equation: 'HCOв‚ѓвЃ» + Hв‚ѓOвЃє в†’ Hв‚‚COв‚ѓ + Hв‚‚O'
            },
            'hno3-h2o': {
                acid: { formula: 'HNOв‚ѓ', conjugate: 'NOв‚ѓвЃ»', donates: true },
                base: { formula: 'Hв‚‚O', conjugate: 'Hв‚ѓOвЃє', donates: false },
                equation: 'HNOв‚ѓ + Hв‚‚O в†’ NOв‚ѓвЃ» + Hв‚ѓOвЃє'
            },
            'ch3cooh-h2o': {
                acid: { formula: 'CHв‚ѓCOOH', conjugate: 'CHв‚ѓCOOвЃ»', donates: true },
                base: { formula: 'Hв‚‚O', conjugate: 'Hв‚ѓOвЃє', donates: false },
                equation: 'CHв‚ѓCOOH + Hв‚‚O в†’ CHв‚ѓCOOвЃ» + Hв‚ѓOвЃє'
            },
            'ch3coo-h3o': {
                acid: { formula: 'Hв‚ѓOвЃє', conjugate: 'Hв‚‚O', donates: true },
                base: { formula: 'CHв‚ѓCOOвЃ»', conjugate: 'CHв‚ѓCOOH', donates: false },
                equation: 'CHв‚ѓCOOвЃ» + Hв‚ѓOвЃє в†’ CHв‚ѓCOOH + Hв‚‚O'
            },
            'h2so4-h2o': {
                acid: { formula: 'Hв‚‚SOв‚„', conjugate: 'HSOв‚„вЃ»', donates: true },
                base: { formula: 'Hв‚‚O', conjugate: 'Hв‚ѓOвЃє', donates: false },
                equation: 'Hв‚‚SOв‚„ + Hв‚‚O в†’ HSOв‚„вЃ» + Hв‚ѓOвЃє'
            }
        };

        let currentReaction = 'hcl-h2o';
        let dragging = false;
        let hPlusElement = null;
        let acidElement = null;
        let baseElement = null;

        function initGame() {
            const reaction = reactions[currentReaction];
            const mol1 = document.getElementById('molecule1');
            const mol2 = document.getElementById('molecule2');

            // Bestimme welche Seite die SГ¤ure ist
            if (reaction.acid.donates) {
                mol1.innerHTML = createMoleculeHTML(reaction.acid.formula, true);
                mol2.innerHTML = createMoleculeHTML(reaction.base.formula, false);
                acidElement = mol1;
                baseElement = mol2;
            } else {
                mol1.innerHTML = createMoleculeHTML(reaction.base.formula, false);
                mol2.innerHTML = createMoleculeHTML(reaction.acid.formula, true);
                acidElement = mol2;
                baseElement = mol1;
            }

            document.getElementById('equation').textContent = reaction.equation;
            document.getElementById('message').innerHTML = 'Tippe auf die SГ¤ure (HвЃє-Donator), um das Proton zu greifen!';

            // Event-Listener fГјr die SГ¤ure
            const acidBubble = acidElement.querySelector('.bubble');
            if (acidBubble) {
                acidBubble.classList.add('can-donate');
                acidBubble.onclick = function(e) {
                    if (!dragging) {
                        createHPlus(e);
                    }
                };
            }
        }

        function createMoleculeHTML(formula, isAcid) {
            return `
                <div class="bubble ${!isAcid ? 'small' : ''}">
                    ${formula}
                </div>
                <div>${isAcid ? 'SГ¤ure (HвЃє-Donator)' : 'Base (HвЃє-Akzeptor)'}</div>
            `;
        }

        function createHPlus(event) {
            if (dragging) return;

            const acidBubble = acidElement.querySelector('.bubble');
            const rect = acidBubble.getBoundingClientRect();
            
            dragging = true;
            
            // Entferne das HвЃє von der SГ¤ure
            hPlusElement = document.createElement('div');
            hPlusElement.className = 'h-plus';
            hPlusElement.textContent = 'HвЃє';
            hPlusElement.style.left = (rect.left + rect.width/2 - 20) + 'px';
            hPlusElement.style.top = (rect.top + rect.height/2 - 20) + 'px';
            document.body.appendChild(hPlusElement);

            // Г„ndere die SГ¤ure zu ihrer konjugierten Base
            const reaction = reactions[currentReaction];
            const conjugateBase = reaction.acid.donates ? reaction.acid.conjugate : reaction.base.conjugate;
            acidElement.querySelector('.bubble').innerHTML = conjugateBase;

            // Event-Listener fГјr Mausbewegung
            function onMouseMove(e) {
                if (hPlusElement) {
                    hPlusElement.style.left = (e.clientX - 20) + 'px';
                    hPlusElement.style.top = (e.clientY - 20) + 'px';
                }
            }

            // Event-Listener fГјr Loslassen
            function onMouseUp(e) {
                if (!hPlusElement) return;

                const baseBubble = baseElement.querySelector('.bubble');
                const baseRect = baseBubble.getBoundingClientRect();
                
                // PrГјfe ob HвЃє Гјber der Base losgelassen wurde
                if (e.clientX >= baseRect.left && e.clientX <= baseRect.right &&
                    e.clientY >= baseRect.top && e.clientY <= baseRect.bottom) {
                    
                    // Erfolgreiche Reaktion
                    baseBubble.innerHTML = reactions[currentReaction].base.conjugate;
                    
                    document.getElementById('message').innerHTML = 'рџЋ‰ Super! Die Reaktion ist abgelaufen!';
                    
                    // Entferne HвЃє
                    if (hPlusElement) {
                        hPlusElement.remove();
                        hPlusElement = null;
                    }
                    
                    // Deaktiviere weiteren Drag
                    dragging = false;
                } else {
                    // Fehlgeschlagen - setze alles zurГјck
                    document.getElementById('message').innerHTML = 'вќЊ Das HвЃє muss zur Base gezogen werden! Versuche es noch einmal.';
                    resetGame();
                }

                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            }

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        }

        function resetGame() {
            if (hPlusElement) {
                hPlusElement.remove();
                hPlusElement = null;
            }
            dragging = false;
            initGame();
        }

        // Event-Listener fГјr Reaktionsauswahl
        document.querySelectorAll('.reaction-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.reaction-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentReaction = this.dataset.reaction;
                resetGame();
            });
        });

        // Spiel starten
        initGame();
    </script>
</body>
</html>
