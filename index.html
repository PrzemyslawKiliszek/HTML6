<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Brønsted-Säure-Base-Reaktionen</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }
        
        .game-container {
            background-color: rgba(255, 255, 255, 0.98);
            border-radius: 25px;
            padding: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 850px;
            width: 100%;
            max-height: 95vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin: 5px 0 15px 0;
            font-size: clamp(20px, 5vw, 28px);
            padding: 0 5px;
        }
        
        .reaction-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 15px;
            padding: 5px;
        }
        
        .reaction-btn {
            padding: 10px 12px;
            border: none;
            border-radius: 30px;
            background-color: #f0f0f0;
            cursor: pointer;
            font-size: clamp(12px, 3.5vw, 14px);
            transition: all 0.2s;
            min-width: 65px;
            touch-action: manipulation;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-weight: 500;
        }
        
        .reaction-btn:active {
            transform: scale(0.95);
            background-color: #e0e0e0;
        }
        
        .reaction-btn.active {
            background-color: #667eea;
            color: white;
        }
        
        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 10px 5px;
        }
        
        .instruction-box {
            background: linear-gradient(145deg, #f8f9ff, #e8e9ff);
            padding: 12px 15px;
            border-radius: 50px;
            width: 100%;
            text-align: center;
            font-size: clamp(14px, 4vw, 16px);
            color: #4a5568;
            font-weight: 500;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
            border: 2px solid white;
            margin-bottom: 5px;
        }
        
        .molecules {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .molecule-wrapper {
            flex: 1;
            min-width: 140px;
            text-align: center;
            position: relative;
        }
        
        .bubble {
            display: flex;
            align-items: center;
            justify-content: center;
            width: min(160px, 40vw);
            height: min(160px, 40vw);
            border-radius: 50%;
            background: linear-gradient(145deg, #ffffff, #f0f0f0);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            font-size: clamp(18px, 6vw, 26px);
            font-weight: bold;
            margin: 10px auto;
            position: relative;
            transition: all 0.3s ease;
            border: 4px solid transparent;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        .bubble:active {
            transform: scale(0.95);
        }
        
        .bubble.acid-clickable {
            animation: gentlePulse 2s infinite;
            border-color: #667eea;
        }
        
        .bubble.base-highlight {
            border-color: #4CAF50;
            box-shadow: 0 0 25px #4CAF50;
            transform: scale(1.02);
        }
        
        .bubble.wrong-choice {
            border-color: #ff4757;
            animation: shake 0.3s ease-in-out;
        }
        
        @keyframes gentlePulse {
            0% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.5); }
            70% { box-shadow: 0 0 0 15px rgba(102, 126, 234, 0); }
            100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        
        .arrow {
            font-size: clamp(30px, 8vw, 45px);
            color: #666;
            margin: 0 5px;
            font-weight: 300;
        }
        
        .h-plus {
            position: fixed;
            width: min(55px, 12vw);
            height: min(55px, 12vw);
            border-radius: 50%;
            background: linear-gradient(145deg, #ff6b6b, #ff3838);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: clamp(16px, 5vw, 22px);
            box-shadow: 0 8px 20px rgba(255,56,56,0.5);
            z-index: 9999;
            pointer-events: none;
            transform: translate(-50%, -50%);
            touch-action: none;
            border: 3px solid white;
        }
        
        .message {
            text-align: center;
            font-size: clamp(14px, 4vw, 17px);
            color: #333;
            min-height: 70px;
            padding: 15px;
            background-color: #ffffff;
            border-radius: 20px;
            width: 100%;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
            border: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            line-height: 1.4;
        }
        
        .reaction-equation {
            font-size: clamp(16px, 5vw, 22px);
            font-weight: bold;
            color: #2c3e50;
            padding: 18px 12px;
            background: linear-gradient(145deg, #bbdefb, #90caf9);
            border-radius: 50px;
            width: 100%;
            text-align: center;
            opacity: 0;
            transition: opacity 0.4s ease;
            border: 3px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin: 5px 0;
        }
        
        .reaction-equation.show {
            opacity: 1;
        }
        
        .footer {
            width: 100%;
            text-align: center;
            margin-top: 15px;
            padding: 12px 5px;
            border-top: 2px solid #e0e0e0;
            font-size: clamp(12px, 3.5vw, 15px);
            color: #666;
            font-weight: 500;
            background: rgba(255,255,255,0.5);
            border-radius: 30px;
        }
        
        .reset-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 40px;
            background: linear-gradient(145deg, #667eea, #5a67d8);
            color: white;
            font-size: clamp(14px, 4vw, 18px);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            width: 100%;
            max-width: 300px;
            margin: 5px auto;
            border: 2px solid white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .reset-btn:active {
            transform: scale(0.95);
            background: linear-gradient(145deg, #5a67d8, #4c51bf);
        }
        
        .attempt-counter {
            font-size: clamp(12px, 3.5vw, 14px);
            color: #888;
            margin: 5px 0;
        }
        
        @media (max-width: 600px) {
            .game-container {
                padding: 12px;
                max-height: 98vh;
            }
            
            .molecules {
                gap: 5px;
            }
            
            .bubble {
                width: min(140px, 38vw);
                height: min(140px, 38vw);
            }
            
            .instruction-box {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🧪 Säure oder Base? 🧪</h1>
        
        <div class="reaction-selector">
            <button class="reaction-btn active" data-reaction="hcl-h2o">HCl + H₂O</button>
            <button class="reaction-btn" data-reaction="nh3-h2o">NH₃ + H₂O</button>
            <button class="reaction-btn" data-reaction="hcl-oh">HCl + OH⁻</button>
            <button class="reaction-btn" data-reaction="hco3-h3o">HCO₃⁻ + H₃O⁺</button>
            <button class="reaction-btn" data-reaction="hno3-h2o">HNO₃ + H₂O</button>
            <button class="reaction-btn" data-reaction="ch3cooh-h2o">CH₃COOH + H₂O</button>
            <button class="reaction-btn" data-reaction="ch3coo-h3o">CH₃COO⁻ + H₃O⁺</button>
            <button class="reaction-btn" data-reaction="h2so4-h2o">H₂SO₄ + H₂O</button>
        </div>

        <div class="game-area">
            <div class="instruction-box" id="instruction">
                🔍 Überlege: Welches Molekül gibt H⁺ ab? Tippe es an!
            </div>

            <div class="molecules">
                <div class="molecule-wrapper" id="molecule1"></div>
                <div class="arrow">➕</div>
                <div class="molecule-wrapper" id="molecule2"></div>
            </div>

            <div class="message" id="message">
                Tippe auf das Molekül, das du für die Säure (H⁺-Donator) hältst
            </div>

            <div class="reaction-equation" id="equation"></div>

            <button class="reset-btn" onclick="resetGame()">🔄 Neustart</button>
            
            <div class="footer" id="copyright">
                Copyright © 2024 Dr. P. Kiliszek
            </div>
            
            <div class="attempt-counter" id="attemptCounter"></div>
        </div>
    </div>

    <script>
        const reactions = {
            'hcl-h2o': {
                acid: { formula: 'HCl', conjugate: 'Cl⁻' },
                base: { formula: 'H₂O', conjugate: 'H₃O⁺' },
                equation: 'HCl + H₂O → Cl⁻ + H₃O⁺',
                acidHint: 'HCl (Salzsäure) gibt leicht H⁺ ab',
                baseHint: 'H₂O (Wasser) kann H⁺ aufnehmen'
            },
            'nh3-h2o': {
                acid: { formula: 'H₂O', conjugate: 'OH⁻' },
                base: { formula: 'NH₃', conjugate: 'NH₄⁺' },
                equation: 'NH₃ + H₂O → NH₄⁺ + OH⁻',
                acidHint: 'H₂O (Wasser) gibt hier H⁺ an NH₃ ab',
                baseHint: 'NH₃ (Ammoniak) ist eine Base'
            },
            'hcl-oh': {
                acid: { formula: 'HCl', conjugate: 'Cl⁻' },
                base: { formula: 'OH⁻', conjugate: 'H₂O' },
                equation: 'HCl + OH⁻ → Cl⁻ + H₂O',
                acidHint: 'HCl (Salzsäure) ist die stärkere Säure',
                baseHint: 'OH⁻ (Hydroxid) ist eine starke Base'
            },
            'hco3-h3o': {
                acid: { formula: 'H₃O⁺', conjugate: 'H₂O' },
                base: { formula: 'HCO₃⁻', conjugate: 'H₂CO₃' },
                equation: 'HCO₃⁻ + H₃O⁺ → H₂CO₃ + H₂O',
                acidHint: 'H₃O⁺ (Oxonium) gibt leichter H⁺ ab',
                baseHint: 'HCO₃⁻ (Hydrogencarbonat) kann H⁺ aufnehmen'
            },
            'hno3-h2o': {
                acid: { formula: 'HNO₃', conjugate: 'NO₃⁻' },
                base: { formula: 'H₂O', conjugate: 'H₃O⁺' },
                equation: 'HNO₃ + H₂O → NO₃⁻ + H₃O⁺',
                acidHint: 'HNO₃ (Salpetersäure) ist eine starke Säure',
                baseHint: 'H₂O (Wasser) wirkt hier als Base'
            },
            'ch3cooh-h2o': {
                acid: { formula: 'CH₃COOH', conjugate: 'CH₃COO⁻' },
                base: { formula: 'H₂O', conjugate: 'H₃O⁺' },
                equation: 'CH₃COOH + H₂O → CH₃COO⁻ + H₃O⁺',
                acidHint: 'CH₃COOH (Essigsäure) gibt H⁺ ab',
                baseHint: 'H₂O (Wasser) nimmt H⁺ auf'
            },
            'ch3coo-h3o': {
                acid: { formula: 'H₃O⁺', conjugate: 'H₂O' },
                base: { formula: 'CH₃COO⁻', conjugate: 'CH₃COOH' },
                equation: 'CH₃COO⁻ + H₃O⁺ → CH₃COOH + H₂O',
                acidHint: 'H₃O⁺ (Oxonium) ist die Säure',
                baseHint: 'CH₃COO⁻ (Acetat) ist die Base'
            },
            'h2so4-h2o': {
                acid: { formula: 'H₂SO₄', conjugate: 'HSO₄⁻' },
                base: { formula: 'H₂O', conjugate: 'H₃O⁺' },
                equation: 'H₂SO₄ + H₂O → HSO₄⁻ + H₃O⁺',
                acidHint: 'H₂SO₄ (Schwefelsäure) ist die stärkere Säure',
                baseHint: 'H₂O (Wasser) ist hier die Base'
            }
        };

        let currentReaction = 'hcl-h2o';
        let dragging = false;
        let hPlusElement = null;
        let acidElement = null;
        let baseElement = null;
        let attempts = 0;
        let gameStarted = false;
        let acidIdentified = false;

        function initGame() {
            const reaction = reactions[currentReaction];
            const mol1 = document.getElementById('molecule1');
            const mol2 = document.getElementById('molecule2');

            // Zeige beide Moleküle ohne Hinweis, wer Säure oder Base ist
            mol1.innerHTML = createMoleculeHTML(reaction.acid.formula, false);
            mol2.innerHTML = createMoleculeHTML(reaction.base.formula, false);
            
            // Speichere, welches Molekül die Säure ist
            acidElement = reaction.acid.donates ? mol1 : mol2;
            baseElement = reaction.acid.donates ? mol2 : mol1;
            
            // Reset states
            document.getElementById('equation').classList.remove('show');
            document.getElementById('equation').textContent = '';
            document.getElementById('message').innerHTML = '🤔 Tippe auf das Molekül, das H⁺ abgeben kann!';
            document.getElementById('instruction').innerHTML = '🔍 Finde die Säure (H⁺-Donator)';
            document.getElementById('copyright').style.display = 'block';
            
            // Entferne alle Klassen von Bubbles
            document.querySelectorAll('.bubble').forEach(b => {
                b.classList.remove('acid-clickable', 'base-highlight', 'wrong-choice');
            });
            
            acidIdentified = false;
            gameStarted = true;
            updateAttemptCounter();
        }

        function createMoleculeHTML(formula, showRole) {
            return `
                <div class="bubble" onclick="handleMoleculeClick(this, '${formula}')" ontouchstart="handleMoleculeTouch(this, '${formula}')">
                    ${formula}
                </div>
            `;
        }

        function handleMoleculeClick(element, formula) {
            if (!gameStarted || acidIdentified || dragging) return;
            
            const moleculeWrapper = element.closest('.molecule-wrapper');
            const reaction = reactions[currentReaction];
            const isAcid = (moleculeWrapper === acidElement);
            
            attempts++;
            updateAttemptCounter();
            
            if (isAcid) {
                // Richtige Säure ausgewählt
                element.classList.add('acid-clickable');
                acidIdentified = true;
                document.getElementById('message').innerHTML = '✅ Richtig! Das ist die Säure. Tippe nochmal, um H⁺ zu greifen!';
                document.getElementById('instruction').innerHTML = '👆 Tippe jetzt auf die Säure, um H⁺ zu greifen';
                
                // Füge zweiten Click-Listener hinzu
                element.removeEventListener('click', handleAcidClick);
                element.removeEventListener('touchstart', handleAcidTouch);
                element.addEventListener('click', handleAcidClick);
                element.addEventListener('touchstart', handleAcidTouch, { passive: false });
            } else {
                // Falsch - das war die Base
                element.classList.add('wrong-choice');
                document.getElementById('message').innerHTML = '❌ Das ist die Base. Die Säure gibt H⁺ ab! Versuche es nochmal.';
                document.getElementById('instruction').innerHTML = '💡 ' + reaction.acidHint;
                
                setTimeout(() => {
                    element.classList.remove('wrong-choice');
                }, 500);
            }
        }

        function handleMoleculeTouch(element, formula) {
            event.preventDefault();
            handleMoleculeClick(element, formula);
        }

        function handleAcidClick(e) {
            e.preventDefault();
            e.stopPropagation();
            if (!dragging && acidIdentified) {
                createHPlus(e);
            }
        }

        function handleAcidTouch(e) {
            e.preventDefault();
            e.stopPropagation();
            if (!dragging && acidIdentified) {
                const touch = e.touches[0];
                createHPlus(touch);
            }
        }

        function createHPlus(event) {
            if (!acidIdentified) return;
            
            const acidBubble = acidElement.querySelector('.bubble');
            const rect = acidBubble.getBoundingClientRect();
            
            dragging = true;
            
            // Ändere die Säure zu ihrer konjugierten Base
            const reaction = reactions[currentReaction];
            const isFirstMoleculeAcid = (acidElement === document.getElementById('molecule1'));
            const conjugateBase = isFirstMoleculeAcid ? reaction.acid.conjugate : reaction.base.conjugate;
            acidElement.querySelector('.bubble').innerHTML = conjugateBase;
            
            // Erstelle H⁺ Element
            hPlusElement = document.createElement('div');
            hPlusElement.className = 'h-plus';
            hPlusElement.textContent = 'H⁺';
            hPlusElement.style.left = event.clientX + 'px';
            hPlusElement.style.top = event.clientY + 'px';
            document.body.appendChild(hPlusElement);

            // Hebe die Base hervor
            const baseBubble = baseElement.querySelector('.bubble');
            baseBubble.classList.add('base-highlight');

            document.getElementById('instruction').innerHTML = '👆 Ziehe H⁺ zur Base!';
            document.getElementById('message').innerHTML = 'Ziehe das Proton zur Base...';

            function onMove(e) {
                e.preventDefault();
                if (hPlusElement) {
                    const clientX = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
                    const clientY = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
                    
                    if (clientX && clientY) {
                        hPlusElement.style.left = clientX + 'px';
                        hPlusElement.style.top = clientY + 'px';
                        
                        // Dynamische Hervorhebung
                        const baseRect = baseBubble.getBoundingClientRect();
                        if (clientX >= baseRect.left && clientX <= baseRect.right &&
                            clientY >= baseRect.top && clientY <= baseRect.bottom) {
                            baseBubble.classList.add('base-highlight');
                        }
                    }
                }
            }

            function onEnd(e) {
                e.preventDefault();
                if (!hPlusElement) return;

                const baseBubble = baseElement.querySelector('.bubble');
                const baseRect = baseBubble.getBoundingClientRect();
                
                const clientX = e.clientX || (e.changedTouches && e.changedTouches[0] ? e.changedTouches[0].clientX : 0);
                const clientY = e.clientY || (e.changedTouches && e.changedTouches[0] ? e.changedTouches[0].clientY : 0);
                
                if (clientX >= baseRect.left && clientX <= baseRect.right &&
                    clientY >= baseRect.top && clientY <= baseRect.bottom) {
                    
                    // Erfolg
                    baseBubble.innerHTML = isFirstMoleculeAcid ? reaction.base.conjugate : reaction.acid.conjugate;
                    
                    // Zeige Reaktionsgleichung
                    const equationElement = document.getElementById('equation');
                    equationElement.textContent = reaction.equation;
                    equationElement.classList.add('show');
                    
                    document.getElementById('message').innerHTML = '🎉 Perfekt! Die Reaktion ist korrekt!';
                    document.getElementById('instruction').innerHTML = '✅ Reaktion erfolgreich! Wähle eine neue Reaktion.';
                    
                    if (hPlusElement) {
                        hPlusElement.remove();
                        hPlusElement = null;
                    }
                    
                    baseBubble.classList.remove('base-highlight');
                    dragging = false;
                    
                    // Copyright bleibt sichtbar
                    document.getElementById('copyright').style.display = 'block';
                    
                } else {
                    // Fehlschlag
                    document.getElementById('message').innerHTML = '❌ Das H⁺ muss zur Base! Versuche es nochmal.';
                    resetGame();
                }

                removeListeners();
            }

            function removeListeners() {
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onEnd);
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('touchend', onEnd);
                document.removeEventListener('touchcancel', onEnd);
            }

            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onEnd);
            document.addEventListener('touchmove', onMove, { passive: false });
            document.addEventListener('touchend', onEnd);
            document.addEventListener('touchcancel', onEnd);
        }

        function updateAttemptCounter() {
            const counterElement = document.getElementById('attemptCounter');
            if (attempts > 0) {
                counterElement.textContent = `Versuche: ${attempts}`;
            } else {
                counterElement.textContent = '';
            }
        }

        function resetGame() {
            if (hPlusElement) {
                hPlusElement.remove();
                hPlusElement = null;
            }
            dragging = false;
            acidIdentified = false;
            
            // Entferne alle Hervorhebungen
            document.querySelectorAll('.bubble').forEach(b => {
                b.classList.remove('acid-clickable', 'base-highlight', 'wrong-choice');
            });
            
            initGame();
        }

        // Event-Listener für Reaktionsauswahl
        document.querySelectorAll('.reaction-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelectorAll('.reaction-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentReaction = this.dataset.reaction;
                attempts = 0;
                resetGame();
            });
            
            btn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                document.querySelectorAll('.reaction-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentReaction = this.dataset.reaction;
                attempts = 0;
                resetGame();
            }, { passive: false });
        });

        // Verhindere Scrollen während des Ziehens
        document.body.addEventListener('touchmove', function(e) {
            if (dragging) {
                e.preventDefault();
            }
        }, { passive: false });

        // Spiel starten
        initGame();
    </script>
</body>
</html>
