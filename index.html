<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Brønsted-Säure-Base-Reaktionen</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            touch-action: none; /* Verhindert Scrollen während des Spiels */
        }
        .game-container {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
            touch-action: pan-y; /* Erlaubt vertikales Scrollen außerhalb der Spielelemente */
        }
        h1 {
            text-align: center;
            color: #333;
            margin-top: 0;
            font-size: 24px;
        }
        .reaction-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .reaction-btn {
            padding: 12px 18px;
            border: none;
            border-radius: 25px;
            background-color: #f0f0f0;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            min-width: 70px;
            touch-action: manipulation; /* Verbessert Touch-Verhalten */
        }
        .reaction-btn:hover {
            background-color: #e0e0e0;
        }
        .reaction-btn.active {
            background-color: #667eea;
            color: white;
        }
        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        .molecules {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
            gap: 15px;
            flex-wrap: wrap;
        }
        .molecule {
            flex: 1;
            min-width: 150px;
            text-align: center;
        }
        .molecule.can-donate .bubble {
            animation: pulse 1.5s infinite;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent; /* Entfernt grauen Tap-Highlight auf Mobile */
        }
        .bubble {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            font-size: 24px;
            font-weight: bold;
            margin: 10px auto;
            position: relative;
            transition: all 0.3s;
            border: 3px solid transparent;
            touch-action: manipulation;
            user-select: none; /* Verhindert Texthervorhebung */
        }
        .bubble.small {
            width: 120px;
            height: 120px;
            font-size: 20px;
        }
        .bubble.target-highlight {
            border-color: #4CAF50;
            box-shadow: 0 0 20px #4CAF50;
        }
        .h-plus {
            position: fixed;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(145deg, #ff6b6b, #ff3838);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 5px 15px rgba(255,56,56,0.4);
            z-index: 1000;
            pointer-events: none; /* Verhindert Interferenz mit Touch-Events */
            transform: translate(-50%, -50%);
            touch-action: none;
            user-select: none;
        }
        .message {
            text-align: center;
            font-size: 18px;
            color: #333;
            min-height: 60px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 10px;
            width: 100%;
            box-sizing: border-box;
        }
        .reset-btn {
            padding: 15px 40px;
            border: none;
            border-radius: 25px;
            background-color: #667eea;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .reset-btn:hover {
            background-color: #5a67d8;
        }
        .reset-btn:active {
            transform: scale(0.95);
        }
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7);
            }
            70% {
                box-shadow: 0 0 0 20px rgba(102, 126, 234, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(102, 126, 234, 0);
            }
        }
        .arrow {
            font-size: 40px;
            color: #666;
            margin: 0 10px;
        }
        .reaction-equation {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            padding: 15px;
            background-color: #e3f2fd;
            border-radius: 10px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
            min-height: 70px;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .reaction-equation.show {
            opacity: 1;
        }
        .copyright {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
            border-top: 1px solid #ddd;
            padding-top: 15px;
        }
        .instruction {
            font-size: 16px;
            color: #555;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🧪 Brønsted-Säure-Base-Reaktionen 🧪</h1>
        
        <div class="reaction-selector">
            <button class="reaction-btn active" data-reaction="hcl-h2o">HCl + H₂O</button>
            <button class="reaction-btn" data-reaction="nh3-h2o">NH₃ + H₂O</button>
            <button class="reaction-btn" data-reaction="hcl-oh">HCl + OH⁻</button>
            <button class="reaction-btn" data-reaction="hco3-h3o">HCO₃⁻ + H₃O⁺</button>
            <button class="reaction-btn" data-reaction="hno3-h2o">HNO₃ + H₂O</button>
            <button class="reaction-btn" data-reaction="ch3cooh-h2o">CH₃COOH + H₂O</button>
            <button class="reaction-btn" data-reaction="ch3coo-h3o">CH₃COO⁻ + H₃O⁺</button>
            <button class="reaction-btn" data-reaction="h2so4-h2o">H₂SO₄ + H₂O</button>
        </div>

        <div class="game-area">
            <div class="instruction" id="instruction">
                👆 Tippe auf die pulsierende Säure, um das H⁴ zu greifen
            </div>

            <div class="molecules">
                <div class="molecule" id="molecule1"></div>
                <div class="arrow">➕</div>
                <div class="molecule" id="molecule2"></div>
            </div>

            <div class="message" id="message">
                Wähle eine Reaktion aus oder tippe auf die Säure!
            </div>

            <div class="reaction-equation" id="equation"></div>

            <button class="reset-btn" onclick="resetGame()">Neustart</button>
            
            <div class="copyright">
                Copyright: Dr. P. Kiliszek
            </div>
        </div>
    </div>

    <script>
        const reactions = {
            'hcl-h2o': {
                acid: { formula: 'HCl', conjugate: 'Cl⁻', donates: true },
                base: { formula: 'H₂O', conjugate: 'H₃O⁺', donates: false },
                equation: 'HCl + H₂O → Cl⁻ + H₃O⁺'
            },
            'nh3-h2o': {
                acid: { formula: 'H₂O', conjugate: 'OH⁻', donates: true },
                base: { formula: 'NH₃', conjugate: 'NH₄⁺', donates: false },
                equation: 'NH₃ + H₂O → NH₄⁺ + OH⁻'
            },
            'hcl-oh': {
                acid: { formula: 'HCl', conjugate: 'Cl⁻', donates: true },
                base: { formula: 'OH⁻', conjugate: 'H₂O', donates: false },
                equation: 'HCl + OH⁻ → Cl⁻ + H₂O'
            },
            'hco3-h3o': {
                acid: { formula: 'H₃O⁺', conjugate: 'H₂O', donates: true },
                base: { formula: 'HCO₃⁻', conjugate: 'H₂CO₃', donates: false },
                equation: 'HCO₃⁻ + H₃O⁺ → H₂CO₃ + H₂O'
            },
            'hno3-h2o': {
                acid: { formula: 'HNO₃', conjugate: 'NO₃⁻', donates: true },
                base: { formula: 'H₂O', conjugate: 'H₃O⁺', donates: false },
                equation: 'HNO₃ + H₂O → NO₃⁻ + H₃O⁺'
            },
            'ch3cooh-h2o': {
                acid: { formula: 'CH₃COOH', conjugate: 'CH₃COO⁻', donates: true },
                base: { formula: 'H₂O', conjugate: 'H₃O⁺', donates: false },
                equation: 'CH₃COOH + H₂O → CH₃COO⁻ + H₃O⁺'
            },
            'ch3coo-h3o': {
                acid: { formula: 'H₃O⁺', conjugate: 'H₂O', donates: true },
                base: { formula: 'CH₃COO⁻', conjugate: 'CH₃COOH', donates: false },
                equation: 'CH₃COO⁻ + H₃O⁺ → CH₃COOH + H₂O'
            },
            'h2so4-h2o': {
                acid: { formula: 'H₂SO₄', conjugate: 'HSO₄⁻', donates: true },
                base: { formula: 'H₂O', conjugate: 'H₃O⁺', donates: false },
                equation: 'H₂SO₄ + H₂O → HSO₄⁻ + H₃O⁺'
            }
        };

        let currentReaction = 'hcl-h2o';
        let dragging = false;
        let hPlusElement = null;
        let acidElement = null;
        let baseElement = null;
        let currentAcidFormula = '';
        let currentBaseFormula = '';

        function initGame() {
            const reaction = reactions[currentReaction];
            const mol1 = document.getElementById('molecule1');
            const mol2 = document.getElementById('molecule2');

            // Bestimme welche Seite die Säure ist
            if (reaction.acid.donates) {
                mol1.innerHTML = createMoleculeHTML(reaction.acid.formula, true);
                mol2.innerHTML = createMoleculeHTML(reaction.base.formula, false);
                acidElement = mol1;
                baseElement = mol2;
                currentAcidFormula = reaction.acid.formula;
                currentBaseFormula = reaction.base.formula;
            } else {
                mol1.innerHTML = createMoleculeHTML(reaction.base.formula, false);
                mol2.innerHTML = createMoleculeHTML(reaction.acid.formula, true);
                acidElement = mol2;
                baseElement = mol1;
                currentAcidFormula = reaction.base.formula;
                currentBaseFormula = reaction.acid.formula;
            }

            document.getElementById('equation').classList.remove('show');
            document.getElementById('equation').textContent = '';
            document.getElementById('message').innerHTML = '👆 Tippe auf die pulsierende Säure, um das H⁺ zu greifen!';
            document.getElementById('instruction').innerHTML = '👆 Tippe auf die pulsierende Säure, um das H⁺ zu greifen';

            // Event-Listener für die Säure
            const acidBubble = acidElement.querySelector('.bubble');
            if (acidBubble) {
                acidElement.classList.add('can-donate');
                
                // Entferne alte Event-Listener
                acidBubble.removeEventListener('click', handleAcidClick);
                acidBubble.removeEventListener('touchstart', handleAcidTouch);
                
                // Füge neue Event-Listener hinzu
                acidBubble.addEventListener('click', handleAcidClick);
                acidBubble.addEventListener('touchstart', handleAcidTouch, { passive: false });
            }
        }

        function handleAcidClick(e) {
            e.preventDefault();
            if (!dragging) {
                createHPlus(e);
            }
        }

        function handleAcidTouch(e) {
            e.preventDefault();
            if (!dragging) {
                const touch = e.touches[0];
                createHPlus(touch);
            }
        }

        function createMoleculeHTML(formula, isAcid) {
            return `
                <div class="bubble ${!isAcid ? 'small' : ''}">
                    ${formula}
                </div>
                <div>${isAcid ? 'Säure (H⁺-Donator)' : 'Base (H⁺-Akzeptor)'}</div>
            `;
        }

        function createHPlus(event) {
            if (dragging) return;

            const acidBubble = acidElement.querySelector('.bubble');
            const rect = acidBubble.getBoundingClientRect();
            
            dragging = true;
            
            // Speichere die ursprüngliche Säure-Formel
            const reaction = reactions[currentReaction];
            const conjugateBase = reaction.acid.donates ? reaction.acid.conjugate : reaction.base.conjugate;
            
            // Ändere die Säure zu ihrer konjugierten Base
            acidElement.querySelector('.bubble').innerHTML = conjugateBase;
            
            // Erstelle H⁺ Element
            hPlusElement = document.createElement('div');
            hPlusElement.className = 'h-plus';
            hPlusElement.textContent = 'H⁺';
            hPlusElement.style.left = (event.clientX) + 'px';
            hPlusElement.style.top = (event.clientY) + 'px';
            document.body.appendChild(hPlusElement);

            // Hebe die Base hervor
            const baseBubble = baseElement.querySelector('.bubble');
            baseBubble.classList.add('target-highlight');

            document.getElementById('instruction').innerHTML = '👆 Ziehe das H⁺ zur Base!';

            // Event-Listener für Bewegen und Loslassen
            function onMove(e) {
                e.preventDefault();
                if (hPlusElement) {
                    const clientX = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
                    const clientY = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
                    
                    if (clientX && clientY) {
                        hPlusElement.style.left = clientX + 'px';
                        hPlusElement.style.top = clientY + 'px';
                        
                        // Prüfe ob über der Base
                        const baseRect = baseBubble.getBoundingClientRect();
                        if (clientX >= baseRect.left && clientX <= baseRect.right &&
                            clientY >= baseRect.top && clientY <= baseRect.bottom) {
                            baseBubble.classList.add('target-highlight');
                        } else {
                            baseBubble.classList.remove('target-highlight');
                        }
                    }
                }
            }

            function onEnd(e) {
                e.preventDefault();
                if (!hPlusElement) return;

                const baseBubble = baseElement.querySelector('.bubble');
                const baseRect = baseBubble.getBoundingClientRect();
                
                const clientX = e.clientX || (e.changedTouches && e.changedTouches[0] ? e.changedTouches[0].clientX : 0);
                const clientY = e.clientY || (e.changedTouches && e.changedTouches[0] ? e.changedTouches[0].clientY : 0);
                
                // Prüfe ob H⁺ über der Base losgelassen wurde
                if (clientX >= baseRect.left && clientX <= baseRect.right &&
                    clientY >= baseRect.top && clientY <= baseRect.bottom) {
                    
                    // Erfolgreiche Reaktion - Base ändert sich sofort
                    baseBubble.innerHTML = reactions[currentReaction].base.conjugate;
                    
                    // Zeige die Reaktionsgleichung
                    document.getElementById('equation').textContent = reactions[currentReaction].equation;
                    document.getElementById('equation').classList.add('show');
                    
                    document.getElementById('message').innerHTML = '🎉 Super! Die Reaktion ist abgelaufen!';
                    document.getElementById('instruction').innerHTML = '✅ Reaktion erfolgreich! Wähle eine neue Reaktion.';
                    
                    // Entferne H⁺
                    if (hPlusElement) {
                        hPlusElement.remove();
                        hPlusElement = null;
                    }
                    
                    baseBubble.classList.remove('target-highlight');
                    dragging = false;
                    
                    // Entferne can-donate Klasse von der Säure
                    acidElement.classList.remove('can-donate');
                } else {
                    // Fehlgeschlagen - setze alles zurück
                    document.getElementById('message').innerHTML = '❌ Das H⁺ muss zur Base gezogen werden! Versuche es noch einmal.';
                    resetGame();
                }

                // Entferne Event-Listener
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onEnd);
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('touchend', onEnd);
                document.removeEventListener('touchcancel', onEnd);
            }

            // Füge Event-Listener hinzu
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onEnd);
            document.addEventListener('touchmove', onMove, { passive: false });
            document.addEventListener('touchend', onEnd);
            document.addEventListener('touchcancel', onEnd);
        }

        function resetGame() {
            if (hPlusElement) {
                hPlusElement.remove();
                hPlusElement = null;
            }
            dragging = false;
            
            // Entferne Hervorhebungen
            if (baseElement) {
                const baseBubble = baseElement.querySelector('.bubble');
                if (baseBubble) {
                    baseBubble.classList.remove('target-highlight');
                }
            }
            
            initGame();
        }

        // Event-Listener für Reaktionsauswahl
        document.querySelectorAll('.reaction-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelectorAll('.reaction-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentReaction = this.dataset.reaction;
                resetGame();
            });
            
            // Touch support für Buttons
            btn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                document.querySelectorAll('.reaction-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentReaction = this.dataset.reaction;
                resetGame();
            }, { passive: false });
        });

        // Verhindere Scrollen während des Ziehens
        document.body.addEventListener('touchmove', function(e) {
            if (dragging) {
                e.preventDefault();
            }
        }, { passive: false });

        // Spiel starten
        initGame();
    </script>
</body>
</html>
